# fly.toml app configuration file generated for nexttoken on 2026-03-02T15:19:22-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nexttoken'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 5005
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/models"

[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 4096

[mounts]
  source = 'data'
  destination = '/data'
  